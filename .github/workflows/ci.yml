name: ci

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          # 1) immagine ponte Firecrawl (invariata)
          - name: krateo-md-rag
            context: app
          # 2) NUOVO: orchestratore AI RAG/RCA (7° container)
          - name: krateo-agent-core
            context: app/agent-core
          # 3) NUOVO: postgres con pgvector (nuq-postgres NON ha vector)
          - name: krateo-nuq-postgres
            context: app/nuq-postgres
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:${{ matrix.context }}"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: "ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest"
