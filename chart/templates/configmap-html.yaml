apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fireworks-app.fullname" . }}-html
  labels:
    {{- include "fireworks-app.labels" . | nindent 4 }}
data:
  index.html: |
{{ .Files.Get "static/index.html" | default "" | indent 4 }}
  agent.html: |
{{ .Files.Get "static/agent.html" | default "" | indent 4 }}
  krateo-health.html: |
{{ .Files.Get "static/krateo-health.html" | default "" | indent 4 }}