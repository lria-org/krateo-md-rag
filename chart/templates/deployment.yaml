apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fireworks-app.fullname" . }}
  labels:
    {{- include "fireworks-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fireworks-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Rollout mirato dei SOLI pod quando cambiano i ConfigMap (html/nginx).
        # Nessuna ricreazione di cluster/release: ArgoCD riconcilia solo il Deployment.
        checksum/config-html: {{ .Files.Get "static/index.html" | sha256sum }}
        checksum/config-agent-html: {{ .Files.Get "static/agent.html" | sha256sum }}
        checksum/config-health-html: {{ .Files.Get "static/krateo-health.html" | sha256sum }}
        checksum/config-nginx: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fireworks-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fireworks-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # 1. CONTAINER PRINCIPALE: Firecrawl API (Con controllo porte nativo via Node)
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "==> [STARTUP] Controllo disponibilità di RabbitMQ (porta 5672)..."
              until node -e "const net = require('net'); const c = net.connect({port: 5672, host: 'localhost'}, () => process.exit(0)); c.on('error', () => process.exit(1));" 2>/dev/null; do
                echo "==> [STARTUP] RabbitMQ non è ancora pronto. Ricontrollo tra 2 secondi..."
                sleep 2
              done
              
              echo "==> [STARTUP] Controllo disponibilità di Postgres (porta 5432)..."
              until node -e "const net = require('net'); const c = net.connect({port: 5432, host: 'localhost'}, () => process.exit(0)); c.on('error', () => process.exit(1));" 2>/dev/null; do
                echo "==> [STARTUP] Postgres non è ancora pronto. Ricontrollo tra 2 secondi..."
                sleep 2
              done

              echo "==> [STARTUP] Tutti i servizi backend sono ONLINE! Avvio Firecrawl..."
              node dist/src/harness.js --start-docker
          ports:
            - name: firecrawl-api
              containerPort: 3002
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: firecrawl-api
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: firecrawl-api
            initialDelaySeconds: 45
            periodSeconds: 10
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        # 2. SIDECAR: Nginx (Frontend + Reverse Proxy on Port 8080)
        - name: nginx-frontend
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: html-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

        # 3. SIDECAR: Playwright Service
        - name: playwright-service
          image: "{{ .Values.sidecars.playwright.image }}"
          ports:
            - name: playwright
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: MAX_CONCURRENT_PAGES
              value: "10"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

        # 4. SIDECAR: Redis Server
        - name: redis
          image: "{{ .Values.sidecars.redis.image }}"
          command: ["redis-server", "--bind", "0.0.0.0", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

        # 5. SIDECAR: RabbitMQ Message Broker
        - name: rabbitmq
          image: "{{ .Values.sidecars.rabbitmq.image }}"
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"

        # 6. SIDECAR: Nuq-Postgres Database (custom: nuq-postgres + pgvector)
        - name: nuq-postgres
          image: "{{ .Values.sidecars.postgres.image }}"
          imagePullPolicy: {{ .Values.sidecars.postgres.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"

        # 7. SIDECAR: Agent-Core (Orchestratore AI - RAG + Log Analysis + RCA)
        {{- if .Values.agentCore.enabled }}
        - name: agent-core
          image: "{{ .Values.sidecars.agentCore.image }}"
          imagePullPolicy: {{ .Values.agentCore.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: agent-api
              containerPort: {{ .Values.agentCore.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.agentCore.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/agent/health
              port: agent-api
            initialDelaySeconds: 10
            periodSeconds: 10
        {{- end }}

      volumes:
        - name: html-files
          configMap:
            name: {{ include "fireworks-app.fullname" . }}-html
        - name: nginx-config
          configMap:
            name: {{ include "fireworks-app.fullname" . }}-nginx-config

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
