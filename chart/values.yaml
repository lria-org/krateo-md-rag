replicaCount: 1

image:
  repository: ghcr.io/lria-org/krateo-md-rag
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

# Configurazione del Servizio per Kubernetes (Reindirizza su Nginx porta 8080)
service:
  type: NodePort
  port: 31181            # Porta del Servizio richiesta
  nodePort: 31181        # Espone direttamente sul localhost del tuo Mac alla porta 8181

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: krateo.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# --- VARIABILI D'AMBIENTE ---
env:
  HOST: "0.0.0.0"
  PORT: "3002"
  ENV: "local"
  NUQ_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  REDIS_URL: "redis://localhost:6379"
  REDIS_RATE_LIMIT_URL: "redis://localhost:6379"
  PLAYWRIGHT_MICROSERVICE_URL: "http://localhost:3000/scrape"
  POSTGRES_HOST: "localhost"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "postgres"
  USE_DB_AUTHENTICATION: "false"
  NUM_WORKERS_PER_QUEUE: "8"
  CRAWL_CONCURRENT_REQUESTS: "10"
  MAX_CONCURRENT_JOBS: "5"
  BROWSER_POOL_SIZE: "5"
  LOGGING_LEVEL: "info"
  BULL_AUTH_KEY: "CHANGEME"
  ALLOW_LOCAL_WEBHOOKS: "false"
  BLOCK_MEDIA: "false"
  EXTRACT_WORKER_PORT: "3004"
  WORKER_PORT: "3005"
  NUQ_RABBITMQ_URL: "amqp://localhost:5672"
  HARNESS_STARTUP_TIMEOUT_MS: "60000"
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: ""
  MODEL_NAME: ""
  MODEL_EMBEDDING_NAME: ""
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"

# --- IMMAGINI DEI CONTAINER DI SUPPORTO ---
sidecars:
  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
  redis:
    image: redis:7-alpine
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
  postgres:
    image: ghcr.io/lria-org/krateo-nuq-postgres:latest   # nuq-postgres + pgvector (build in CI)
  agentCore:
    image: ghcr.io/lria-org/krateo-agent-core:latest

# --- CONFIG AGENT-CORE (7° container) ---
agentCore:
  enabled: true
  port: 8000
  pullPolicy: IfNotPresent   # locale/kind: usa l'immagine caricata con 'kind load'; in prod ArgoCD la pulla dal registry
  env:
    EMBED_PROVIDER: "ollama"
    OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    MODEL_NAME: "gemma2:9b"
    MODEL_EMBEDDING_NAME: "nomic-embed-text"
    EMBED_DIM: "768"
    AGENT_DB_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

# --- RBAC per lettura log Kubernetes ---
rbac:
  create: true
  # ClusterRole = accesso pods/log su tutti i namespace del cluster
  logNamespaces:
    - krateo-system
    - krateo-demo

resources: {}
autoscaling:
  enabled: false
nodeSelector: {}
tolerations: []
affinity: {}