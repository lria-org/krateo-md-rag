replicaCount: 1

image:
  repository: ghcr.io/lria-org/krateo-md-rag
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

# Configurazione del Servizio per Kubernetes
service:
  type: NodePort
  port: 31180          # Porta interna su cui risponde Firecrawl
  nodePort: 31180     # Porta esterna esposta sul tuo localhost

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# --- VARIABILI D'AMBIENTE (Traslocate dal tuo Docker Compose) ---
env:
  HOST: "0.0.0.0"
  PORT: "3002"
  ENV: "local"
  NUQ_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  REDIS_URL: "redis://localhost:6379"
  REDIS_RATE_LIMIT_URL: "redis://localhost:6379"
  PLAYWRIGHT_MICROSERVICE_URL: "http://localhost:3000/scrape"
  POSTGRES_HOST: "localhost"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "postgres"
  USE_DB_AUTHENTICATION: "false"
  NUM_WORKERS_PER_QUEUE: "8"
  CRAWL_CONCURRENT_REQUESTS: "10"
  MAX_CONCURRENT_JOBS: "5"
  BROWSER_POOL_SIZE: "5"
  LOGGING_LEVEL: "info"
  BULL_AUTH_KEY: "CHANGEME"
  ALLOW_LOCAL_WEBHOOKS: "false"
  BLOCK_MEDIA: "false"
  EXTRACT_WORKER_PORT: "3004"
  WORKER_PORT: "3005"
  NUQ_RABBITMQ_URL: "amqp://localhost:5672"
  HARNESS_STARTUP_TIMEOUT_MS: "60000"
  # Inserisci qui i tuoi token se li usi:
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: ""
  MODEL_NAME: ""
  MODEL_EMBEDDING_NAME: ""
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"

# --- IMMAGINI DEI CONTAINER DI SUPPORTO (Sidecars) ---
sidecars:
  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
  redis:
    image: redis:7-alpine
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
  postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest

resources: {}
autoscaling:
  enabled: false
nodeSelector: {}
tolerations: []
affinity: {}