# TEST LOCALE ISOLATO — NON tocca il cluster né Git.
# Replica il pod: pgvector + agent-core + nginx (stesso routing /api/agent/).
# Avvio:  docker compose -f docker-compose.test.yml up --build
# GUI:    http://localhost:8088/agent.html
# Stop+pulizia totale:  docker compose -f docker-compose.test.yml down -v
services:

  postgres:
    image: pgvector/pgvector:pg16      # postgres con estensione vector inclusa
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports: ["5433:5432"]               # 5433 sul Mac per non collidere con altri postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  agent-core:
    build: .
    environment:
      AGENT_DB_URL: "postgresql://postgres:postgres@postgres:5432/postgres"
      EMBED_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"   # Ollama sul Mac
      MODEL_NAME: "gemma2:9b"
      MODEL_EMBEDDING_NAME: "nomic-embed-text"
      EMBED_DIM: "768"
    depends_on:
      postgres:
        condition: service_healthy
    # kubeconfig opzionale: abilita /logs e /analyze anche in locale.
    # Scommenta le 2 righe per testare pure la parte Kubernetes:
    # volumes:
    #   - ${HOME}/.kube/config:/root/.kube/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    ports: ["8088:8080"]               # GUI su http://localhost:8088
    volumes:
      - ../../chart/static:/usr/share/nginx/html:ro
      - ./nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [agent-core]
